<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Henra • Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/jpeg" href="images/favicon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #000000;
      --secondary: #8B5E3C;
      --secondary-light: #A97C58;
      --secondary-dark: #6B4226;
      --text: #000000;
      --text-light: #333333;
      --bg: #FFFFFF;
      --bg-light: #F5F0EB;
      --border: #D4B8A0;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 20px 30px rgba(139, 94, 60, 0.12);
      --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      --body-bg-start: #F7F2EC;
      --body-bg-end: #EBDDCB;
      --input-bg: #FFFFFF;
      --card-radius: 36px;
    }

    .dark-mode {
      --primary: #C8956A;
      --secondary: #C8956A;
      --secondary-light: #D9AF84;
      --secondary-dark: #A57248;
      --text: #F5F0EB;
      --text-light: #CFC5BC;
      --bg: #1E150E;
      --bg-light: #2B2017;
      --border: #5C3D1E;
      --body-bg-start: #000000;
      --body-bg-end: #0a0a0a;
      --input-bg: #2A1F16;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--body-bg-start), var(--body-bg-end));
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, color 0.2s;
      padding: 1rem;
      margin: 0;
    }

    h1, h2, h3, .logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
    }

    /* unified toggle bar — better on small screens, no overflow */
    .toggle-bar {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 12px;
      z-index: 1000;
      background: transparent;
    }

    .toggle-btn {
      background: var(--bg);
      backdrop-filter: blur(8px);
      background-color: rgba(var(--bg-rgb, 255, 255, 255), 0.85);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 7px 14px;
      cursor: pointer;
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.2px;
    }

    .toggle-btn i {
      font-size: 0.85rem;
      color: var(--secondary);
    }

    .toggle-btn:hover {
      transform: translateY(-2px);
      border-color: var(--secondary);
      background: var(--bg-light);
    }

    /* card wrapper — perfect centering and responsiveness */
    .signup-card-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
    }

    /* card: stable width, perfect for 360x740 / 360x800 */
    .signup-container {
      max-width: 440px;
      width: 100%;
      background: var(--bg);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow-lg);
      padding: 32px 26px;
      border: 1px solid var(--border);
      transition: background 0.25s ease, border-color 0.2s, transform 0.2s;
      margin: 20px 0;
    }

    /* header styles */
    .signup-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: default;
      justify-content: center;
    }

    .logo i {
      color: var(--secondary);
      font-size: 26px;
    }

    .logo-text {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--secondary-dark), var(--secondary-light));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .signup-header h2 {
      font-size: 1.75rem;
      color: var(--text);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .signup-header p {
      color: var(--text-light);
      font-size: 0.85rem;
    }

    .signup-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--text);
      letter-spacing: 0.3px;
      margin-left: 6px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      left: 18px;
      color: var(--secondary);
      font-size: 0.9rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-wrapper input {
      width: 100%;
      padding: 13px 18px 13px 48px;
      border: 1.5px solid var(--border);
      border-radius: 60px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      background: var(--input-bg);
      color: var(--text);
      transition: all 0.2s ease;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(139, 94, 60, 0.2);
    }

    .password-strength {
      margin-top: 6px;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .strength-bar {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      background: var(--secondary);
      transition: width 0.25s ease, background 0.2s;
      border-radius: 6px;
    }

    .strength-text {
      font-weight: 500;
      font-size: 0.7rem;
      color: var(--text-light);
      min-width: 48px;
    }

    .form-options {
      display: flex;
      align-items: flex-start;
      margin: 4px 0 2px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      color: var(--text-light);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .checkbox-label input {
      width: 16px;
      height: 16px;
      accent-color: var(--secondary);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .terms-link {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 600;
    }

    .terms-link:hover {
      text-decoration: underline;
    }

    .signup-btn-submit {
      background: var(--secondary);
      color: white;
      border: none;
      padding: 13px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Poppins', sans-serif;
      margin-top: 6px;
    }

    .signup-btn-submit:hover {
      background: var(--secondary-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 22px 0 18px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider span {
      padding: 0 14px;
      color: var(--text-light);
      font-size: 0.7rem;
      font-weight: 500;
    }

    .social-signup {
      display: flex;
      gap: 14px;
      justify-content: center;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 6px;
      border: 1.5px solid var(--border);
      border-radius: 60px;
      background: transparent;
      color: var(--text);
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .social-btn i {
      font-size: 1rem;
      color: var(--secondary);
    }

    .social-btn:hover {
      background: var(--bg-light);
      border-color: var(--secondary);
      transform: translateY(-1px);
    }

    .login-prompt {
      text-align: center;
      margin-top: 26px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--text-light);
      font-size: 0.8rem;
    }

    .login-prompt a {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 700;
      margin-left: 6px;
    }

    .login-prompt a:hover {
      text-decoration: underline;
    }

    /* ===== RTL PERFECT ADAPTATION ===== */
    [dir="rtl"] .input-wrapper i {
      left: auto;
      right: 18px;
    }

    [dir="rtl"] .input-wrapper input {
      padding-left: 18px;
      padding-right: 48px;
    }

    [dir="rtl"] .checkbox-label {
      flex-direction: row-reverse;
      justify-content: flex-end;
    }

    [dir="rtl"] .social-btn i {
      margin-left: 4px;
      margin-right: 0;
    }

    [dir="rtl"] .strength-text {
      text-align: right;
    }

    [dir="rtl"] .toggle-bar {
      right: auto;
      left: 16px;
    }

    [dir="rtl"] .signup-header .logo {
      flex-direction: row;
    }

    /* perfect responsiveness for narrow screens (360px-420px) */
    @media (max-width: 480px) {
      body {
        padding: 0.75rem;
      }
      .signup-container {
        padding: 26px 20px;
        max-width: 100%;
        margin: 12px 0;
      }
      .toggle-bar {
        top: 12px;
        right: 12px;
        gap: 8px;
      }
      [dir="rtl"] .toggle-bar {
        right: auto;
        left: 12px;
      }
      .toggle-btn {
        padding: 5px 11px;
        font-size: 0.7rem;
        gap: 5px;
      }
      .toggle-btn i {
        font-size: 0.75rem;
      }
      .signup-header h2 {
        font-size: 1.55rem;
      }
      .logo-text {
        font-size: 22px;
      }
      .input-wrapper input {
        padding: 11px 16px 11px 44px;
        font-size: 0.85rem;
      }
      [dir="rtl"] .input-wrapper input {
        padding-right: 44px;
        padding-left: 16px;
      }
      .input-wrapper i {
        left: 16px;
      }
      [dir="rtl"] .input-wrapper i {
        right: 16px;
        left: auto;
      }
      .social-btn {
        padding: 8px 4px;
        font-size: 0.72rem;
        gap: 5px;
      }
      .signup-btn-submit {
        padding: 11px;
      }
      .checkbox-label {
        font-size: 0.72rem;
        gap: 8px;
      }
    }

    /* for extremely compact heights but still readable */
    @media (max-width: 380px) {
      .signup-container {
        padding: 22px 18px;
      }
      .signup-header {
        margin-bottom: 20px;
      }
      .signup-form {
        gap: 14px;
      }
      .social-signup {
        gap: 10px;
      }
      .toggle-btn {
        padding: 4px 9px;
      }
    }

    /* entrance fade */
    .signup-container {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease, background 0.2s;
    }

    /* Fix dark mode background rgb variable for semi-transparent toggle (optional) */
    body:not(.dark-mode) {
      --bg-rgb: 255, 255, 255;
    }
    body.dark-mode {
      --bg-rgb: 30, 21, 14;
    }
    .toggle-btn {
      background-color: rgba(var(--bg-rgb), 0.9);
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

  <div class="toggle-bar">
    <button class="toggle-btn" id="themeToggleBtn" aria-label="Dark/Light mode">
      <i class="fas fa-moon"></i> <span id="themeText">Dark</span>
    </button>
    <button class="toggle-btn" id="rtlToggleBtn" aria-label="RTL layout">
      <i class="fas fa-exchange-alt"></i> <span id="rtlText">RTL</span>
    </button>
  </div>

  <div class="signup-card-wrapper">
    <div class="signup-container">
      <div class="signup-header">
        <div class="logo">
          <i class="fas fa-leaf"></i>
          <a href="index.html" style="text-decoration: none;"><span class="logo-text">Henra</span></a>
        </div>
        <h2>Create Account</h2>
        <p>Join Henra and start your journey</p>
      </div>

      <form class="signup-form" id="signupForm" novalidate>
        <div class="input-group">
          <label for="fullname">Full Name</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="fullname" name="fullname" placeholder="John Doe" autocomplete="name" required>
          </div>
        </div>

        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="hello@henra.com" autocomplete="email" required>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Create a strong password" autocomplete="new-password" required>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-text" id="strengthText">Weak</span>
          </div>
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <i class="fas fa-check-circle"></i>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" autocomplete="off" required>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="agreeTerms" required>
            <span>I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="signup-btn-submit">Sign Up</button>
      </form>

      <div class="divider">
        <span>OR SIGN UP WITH</span>
      </div>

      <div class="social-signup">
        <a href="#" class="social-btn" aria-label="Sign up with Google">
          <i class="fab fa-google"></i> Google
        </a>
        <a href="#" class="social-btn" aria-label="Sign up with Facebook">
          <i class="fab fa-facebook-f"></i> Facebook
        </a>
      </div>

      <div class="login-prompt">
        Already have an account?
        <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---- Theme handling (dark/light) ----
      const themeBtn = document.getElementById('themeToggleBtn');
      const themeIcon = themeBtn?.querySelector('i');
      const themeSpan = document.getElementById('themeText');
      
      function applyTheme(isDark) {
        if (isDark) {
          document.body.classList.add('dark-mode');
        } else {
          document.body.classList.remove('dark-mode');
        }
        if (themeIcon) {
          themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
        if (themeSpan) {
          themeSpan.textContent = isDark ? 'Light' : 'Dark';
        }
        localStorage.setItem('henra_theme', isDark ? 'dark' : 'light');
      }
      
      function toggleTheme() {
        const willBeDark = !document.body.classList.contains('dark-mode');
        applyTheme(willBeDark);
      }
      
      const savedTheme = localStorage.getItem('henra_theme');
      if (savedTheme === 'dark') {
        applyTheme(true);
      } else if (savedTheme === 'light') {
        applyTheme(false);
      } else {
        applyTheme(false);  // default light mode
      }
      if (themeBtn) themeBtn.addEventListener('click', toggleTheme);
      
      // ---- RTL handling without layout shift / card distortion ----
      const rtlBtn = document.getElementById('rtlToggleBtn');
      const rtlSpan = document.getElementById('rtlText');
      const rtlIconElem = rtlBtn?.querySelector('i');
      
      function setDirection(isRTL) {
        const htmlEl = document.documentElement;
        if (isRTL) {
          htmlEl.setAttribute('dir', 'rtl');
          if (rtlSpan) rtlSpan.textContent = 'LTR';
          if (rtlIconElem) rtlIconElem.className = 'fas fa-arrow-left';
        } else {
          htmlEl.setAttribute('dir', 'ltr');
          if (rtlSpan) rtlSpan.textContent = 'RTL';
          if (rtlIconElem) rtlIconElem.className = 'fas fa-exchange-alt';
        }
        localStorage.setItem('henra_dir', isRTL ? 'rtl' : 'ltr');
        // tiny reflow helper: force card to maintain shape
        const container = document.querySelector('.signup-container');
        if (container) {
          container.style.transform = 'scale(1)';
        }
      }
      
      function toggleRTL() {
        const currentDir = document.documentElement.getAttribute('dir');
        const newIsRTL = currentDir !== 'rtl';
        setDirection(newIsRTL);
      }
      
      const savedDir = localStorage.getItem('henra_dir');
      if (savedDir === 'rtl') {
        setDirection(true);
      } else {
        setDirection(false);
      }
      if (rtlBtn) rtlBtn.addEventListener('click', toggleRTL);
      
      // ---- Password strength meter ----
      const passwordField = document.getElementById('password');
      const strengthFill = document.getElementById('strengthFill');
      const strengthTextSpan = document.getElementById('strengthText');
      
      function calcStrength(pwd) {
        if (!pwd) return 0;
        let score = 0;
        if (pwd.length >= 8) score++;
        if (pwd.length >= 12) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;
        return Math.min(score, 4);
      }
      
      function updateMeter() {
        const pwd = passwordField.value;
        const strength = calcStrength(pwd);
        let percent = 0;
        let label = 'Weak';
        let color = '#e74c3c';
        
        if (pwd.length === 0) {
          percent = 0;
          label = 'Weak';
          color = '#8B5E3C';
        } else if (strength === 1) {
          percent = 25;
          label = 'Weak';
          color = '#e74c3c';
        } else if (strength === 2) {
          percent = 50;
          label = 'Fair';
          color = '#f39c12';
        } else if (strength === 3) {
          percent = 75;
          label = 'Good';
          color = '#2ecc71';
        } else if (strength >= 4) {
          percent = 100;
          label = 'Strong';
          color = '#27ae60';
        }
        
        if (strengthFill) {
          strengthFill.style.width = percent + '%';
          strengthFill.style.backgroundColor = color;
        }
        if (strengthTextSpan) {
          strengthTextSpan.textContent = label;
          strengthTextSpan.style.color = color;
        }
      }
      
      if (passwordField) {
        passwordField.addEventListener('input', updateMeter);
      }
      
      // ---- Confirm password match indicator (smooth UI) ----
      const confirmField = document.getElementById('confirmPassword');
      function syncConfirmBorder() {
        if (!confirmField || !passwordField) return;
        const confirmVal = confirmField.value;
        const passVal = passwordField.value;
        if (confirmVal.length > 0) {
          if (passVal === confirmVal) {
            confirmField.style.borderColor = '#2ecc71';
            confirmField.style.boxShadow = '0 0 0 2px rgba(46, 204, 113, 0.2)';
          } else {
            confirmField.style.borderColor = '#e74c3c';
            confirmField.style.boxShadow = '0 0 0 2px rgba(231, 76, 60, 0.1)';
          }
        } else {
          confirmField.style.borderColor = 'var(--border)';
          confirmField.style.boxShadow = 'none';
        }
      }
      
      if (confirmField && passwordField) {
        passwordField.addEventListener('input', syncConfirmBorder);
        confirmField.addEventListener('input', syncConfirmBorder);
      }
      
      // ---- Signup form handler with smooth feedback ----
      const form = document.getElementById('signupForm');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          
          const fullname = document.getElementById('fullname')?.value.trim();
          const email = document.getElementById('email')?.value.trim();
          const password = passwordField?.value;
          const confirm = confirmField?.value;
          const termsOk = document.getElementById('agreeTerms')?.checked;
          
          if (!fullname || !email || !password || !confirm) {
            alert('Please fill in all required fields.');
            return;
          }
          if (!email.includes('@') || !email.includes('.')) {
            alert('Please enter a valid email address (e.g., name@example.com).');
            return;
          }
          if (password.length < 6) {
            alert('Password must be at least 6 characters long.');
            return;
          }
          if (password !== confirm) {
            alert('Passwords do not match. Please check again.');
            return;
          }
          if (!termsOk) {
            alert('You must agree to the Terms of Service and Privacy Policy.');
            return;
          }
          
          alert(`🎉 Welcome to Henra, ${fullname}!\nYour account has been created successfully.\n\nEmail: ${email}\n\n(Demo successful registration)`);
          // optional: form.reset() could reset but we keep for demo
          // form.reset(); updateMeter & border reset would be needed but not mandatory for demo
        });
      }
      
      // ---- RESPONSIVE FIX: ensure card doesn't overflow on 360x740/800 (already fine) but also on toggle events ----
      function adjustCardPaddingOnSmall() {
        const containerDiv = document.querySelector('.signup-container');
        if (!containerDiv) return;
        const winWidth = window.innerWidth;
        if (winWidth <= 380) {
          containerDiv.style.padding = '22px 16px';
        } else if (winWidth <= 480) {
          containerDiv.style.padding = '26px 20px';
        } else {
          containerDiv.style.padding = '32px 26px';
        }
      }
      
      window.addEventListener('resize', () => {
        adjustCardPaddingOnSmall();
        handleToggleBarSpacing();
      });
      
      function handleToggleBarSpacing() {
        const bar = document.querySelector('.toggle-bar');
        if (bar) {
          const isNarrow = window.innerWidth <= 480;
          bar.style.gap = isNarrow ? '8px' : '12px';
          if (window.innerWidth <= 380) bar.style.gap = '6px';
        }
      }
      
      // smooth entrance animation
      const card = document.querySelector('.signup-container');
      if (card) {
        card.style.opacity = '0';
        setTimeout(() => {
          card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
        }, 50);
      }
      
      // initial call for responsive polish
      adjustCardPaddingOnSmall();
      handleToggleBarSpacing();
      updateMeter();
      syncConfirmBorder();
      
      // ensure that if dark mode & RTL change, card background remains consistent
      const observer = new MutationObserver(() => {
        adjustCardPaddingOnSmall();
      });
      observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
    })();
  </script>
</body>
</html>
