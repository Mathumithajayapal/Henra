<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Henra • Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/jpeg" href="images/favicon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #000000;
      --secondary: #8B5E3C;
      --secondary-light: #A97C58;
      --secondary-dark: #6B4226;
      --text: #000000;
      --text-light: #333333;
      --bg: #FFFFFF;
      --bg-light: #F5F0EB;
      --border: #D4B8A0;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 15px 25px rgba(139, 94, 60, 0.1);
      --transition: all 0.25s ease;
      --body-bg-start: #F7F2EC;
      --body-bg-end: #EBDDCB;
      --input-bg: #FFFFFF;
      --card-radius: 28px;
    }

    .dark-mode {
      --primary: #C8956A;
      --secondary: #C8956A;
      --secondary-light: #D9AF84;
      --secondary-dark: #A57248;
      --text: #F5F0EB;
      --text-light: #CFC5BC;
      --bg: #1E150E;
      --bg-light: #2B2017;
      --border: #5C3D1E;
      --body-bg-start: #000000;
      --body-bg-end: #0a0a0a;
      --input-bg: #2A1F16;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--body-bg-start), var(--body-bg-end));
      line-height: 1.45;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease;
      padding: 12px;
      margin: 0;
    }

    /* compact toggle bar */
    .toggle-bar {
      position: fixed;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 1000;
    }

    .toggle-btn {
      background: var(--bg);
      backdrop-filter: blur(8px);
      background-color: rgba(var(--bg-rgb), 0.92);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 5px 12px;
      cursor: pointer;
      color: var(--text);
      font-size: 0.7rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      font-family: 'Poppins', sans-serif;
    }

    .toggle-btn i {
      font-size: 0.75rem;
      color: var(--secondary);
    }

    .toggle-btn:hover {
      transform: translateY(-1px);
      border-color: var(--secondary);
    }

    /* card wrapper */
    .signup-card-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* COMPACT CARD SIZE - significantly reduced for mobile */
    .signup-container {
      max-width: 380px;
      width: 100%;
      background: var(--bg);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow-lg);
      padding: 22px 20px;
      border: 1px solid var(--border);
      transition: background 0.25s ease, border-color 0.2s;
      margin: 8px 0;
    }

    /* header compact */
    .signup-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      justify-content: center;
    }

    .logo i {
      color: var(--secondary);
      font-size: 22px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--secondary-dark), var(--secondary-light));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .signup-header h2 {
      font-size: 1.45rem;
      color: var(--text);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .signup-header p {
      color: var(--text-light);
      font-size: 0.75rem;
    }

    /* compact form spacing */
    .signup-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.7rem;
      color: var(--text);
      letter-spacing: 0.2px;
      margin-left: 6px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      color: var(--secondary);
      font-size: 0.8rem;
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 10px 14px 10px 40px;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      background: var(--input-bg);
      color: var(--text);
      transition: all 0.2s ease;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 0 2px rgba(139, 94, 60, 0.2);
    }

    /* compact strength meter */
    .password-strength {
      margin-top: 4px;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .strength-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: width 0.2s ease;
      border-radius: 4px;
    }

    .strength-text {
      font-weight: 500;
      font-size: 0.65rem;
      min-width: 42px;
      color: var(--text-light);
    }

    /* checkbox compact */
    .form-options {
      display: flex;
      align-items: flex-start;
      margin: 2px 0 0;
    }

    .checkbox-label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
      color: var(--text-light);
      font-size: 0.7rem;
      line-height: 1.35;
    }

    .checkbox-label input {
      width: 14px;
      height: 14px;
      accent-color: var(--secondary);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .terms-link {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.7rem;
    }

    /* submit button compact */
    .signup-btn-submit {
      background: var(--secondary);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Poppins', sans-serif;
      margin-top: 4px;
    }

    .signup-btn-submit:active {
      transform: scale(0.97);
    }

    /* divider compact */
    .divider {
      display: flex;
      align-items: center;
      margin: 16px 0 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider span {
      padding: 0 12px;
      color: var(--text-light);
      font-size: 0.65rem;
      font-weight: 500;
    }

    /* social buttons compact */
    .social-signup {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 6px;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      background: transparent;
      color: var(--text);
      font-weight: 500;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .social-btn i {
      font-size: 0.85rem;
      color: var(--secondary);
    }

    .social-btn:active {
      transform: scale(0.96);
    }

    /* login prompt compact */
    .login-prompt {
      text-align: center;
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      color: var(--text-light);
      font-size: 0.7rem;
    }

    .login-prompt a {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 700;
      margin-left: 5px;
    }

    /* ===== RTL PERFECT FIXES ===== */
    [dir="rtl"] .input-wrapper i {
      left: auto;
      right: 14px;
    }

    [dir="rtl"] .input-wrapper input {
      padding-left: 14px;
      padding-right: 40px;
    }

    [dir="rtl"] .checkbox-label {
      flex-direction: row-reverse;
      justify-content: flex-end;
    }

    [dir="rtl"] .social-btn i {
      margin-left: 4px;
      margin-right: 0;
    }

    [dir="rtl"] .toggle-bar {
      right: auto;
      left: 12px;
    }

    [dir="rtl"] .strength-text {
      text-align: right;
    }

    /* ===== EXTRA SMALL SCREENS (360px and below) - perfect alignment ===== */
    @media (max-width: 400px) {
      body {
        padding: 8px;
      }
      .signup-container {
        max-width: 100%;
        padding: 18px 16px;
        margin: 4px 0;
      }
      .toggle-bar {
        top: 8px;
        right: 8px;
        gap: 6px;
      }
      [dir="rtl"] .toggle-bar {
        right: auto;
        left: 8px;
      }
      .toggle-btn {
        padding: 4px 10px;
        font-size: 0.65rem;
      }
      .toggle-btn i {
        font-size: 0.7rem;
      }
      .logo i {
        font-size: 20px;
      }
      .logo-text {
        font-size: 20px;
      }
      .signup-header h2 {
        font-size: 1.35rem;
      }
      .signup-header p {
        font-size: 0.7rem;
      }
      .signup-form {
        gap: 12px;
      }
      .input-wrapper input {
        padding: 9px 12px 9px 38px;
        font-size: 0.75rem;
      }
      [dir="rtl"] .input-wrapper input {
        padding-right: 38px;
        padding-left: 12px;
      }
      .input-wrapper i {
        left: 12px;
        font-size: 0.75rem;
      }
      [dir="rtl"] .input-wrapper i {
        right: 12px;
        left: auto;
      }
      .input-group label {
        font-size: 0.65rem;
      }
      .checkbox-label {
        font-size: 0.65rem;
        gap: 6px;
      }
      .signup-btn-submit {
        padding: 9px;
        font-size: 0.8rem;
      }
      .social-btn {
        padding: 6px 4px;
        font-size: 0.68rem;
        gap: 5px;
      }
      .divider span {
        font-size: 0.6rem;
        padding: 0 10px;
      }
      .login-prompt {
        font-size: 0.65rem;
        margin-top: 14px;
        padding-top: 10px;
      }
      .password-strength {
        gap: 6px;
      }
      .strength-text {
        font-size: 0.6rem;
        min-width: 38px;
      }
    }

    /* for very narrow devices like 360x740 - ensure no overflow */
    @media (max-width: 360px) {
      .signup-container {
        padding: 16px 14px;
      }
      .signup-header {
        margin-bottom: 14px;
      }
      .signup-form {
        gap: 10px;
      }
      .social-signup {
        gap: 8px;
      }
      .divider {
        margin: 12px 0 10px;
      }
    }

    /* entrance animation */
    .signup-container {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    /* dark mode rgb variable */
    body:not(.dark-mode) {
      --bg-rgb: 255, 255, 255;
    }
    body.dark-mode {
      --bg-rgb: 30, 21, 14;
    }
    .toggle-btn {
      background-color: rgba(var(--bg-rgb), 0.92);
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

  <div class="toggle-bar">
    <button class="toggle-btn" id="themeToggleBtn" aria-label="Dark/Light mode">
      <i class="fas fa-moon"></i> <span id="themeText">Dark</span>
    </button>
    <button class="toggle-btn" id="rtlToggleBtn" aria-label="RTL layout">
      <i class="fas fa-exchange-alt"></i> <span id="rtlText">RTL</span>
    </button>
  </div>

  <div class="signup-card-wrapper">
    <div class="signup-container">
      <div class="signup-header">
        <div class="logo">
          <i class="fas fa-leaf"></i>
          <a href="index.html" style="text-decoration: none;"><span class="logo-text">Henra</span></a>
        </div>
        <h2>Create Account</h2>
        <p>Join Henra and start your journey</p>
      </div>

      <form class="signup-form" id="signupForm" novalidate>
        <div class="input-group">
          <label for="fullname">Full Name</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="fullname" name="fullname" placeholder="John Doe" autocomplete="name" required>
          </div>
        </div>

        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="hello@henra.com" autocomplete="email" required>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Create a strong password" autocomplete="new-password" required>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-text" id="strengthText">Weak</span>
          </div>
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <i class="fas fa-check-circle"></i>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" autocomplete="off" required>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="agreeTerms" required>
            <span>I agree to the <a href="#" class="terms-link">Terms</a> & <a href="#" class="terms-link">Privacy</a></span>
          </label>
        </div>

        <button type="submit" class="signup-btn-submit">Sign Up</button>
      </form>

      <div class="divider">
        <span>OR SIGN UP WITH</span>
      </div>

      <div class="social-signup">
        <a href="#" class="social-btn" aria-label="Sign up with Google">
          <i class="fab fa-google"></i> Google
        </a>
        <a href="#" class="social-btn" aria-label="Sign up with Facebook">
          <i class="fab fa-facebook-f"></i> Facebook
        </a>
      </div>

      <div class="login-prompt">
        Already have an account?
        <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ----- THEME (Dark/Light) -----
      const themeBtn = document.getElementById('themeToggleBtn');
      const themeIcon = themeBtn?.querySelector('i');
      const themeSpan = document.getElementById('themeText');
      
      function applyTheme(isDark) {
        if (isDark) {
          document.body.classList.add('dark-mode');
        } else {
          document.body.classList.remove('dark-mode');
        }
        if (themeIcon) {
          themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
        if (themeSpan) {
          themeSpan.textContent = isDark ? 'Light' : 'Dark';
        }
        localStorage.setItem('henra_theme', isDark ? 'dark' : 'light');
      }
      
      function toggleTheme() {
        applyTheme(!document.body.classList.contains('dark-mode'));
      }
      
      const savedTheme = localStorage.getItem('henra_theme');
      if (savedTheme === 'dark') {
        applyTheme(true);
      } else {
        applyTheme(false);
      }
      if (themeBtn) themeBtn.addEventListener('click', toggleTheme);
      
      // ----- RTL TOGGLE (no card distortion) -----
      const rtlBtn = document.getElementById('rtlToggleBtn');
      const rtlSpan = document.getElementById('rtlText');
      const rtlIconElem = rtlBtn?.querySelector('i');
      
      function setDirection(isRTL) {
        const htmlEl = document.documentElement;
        if (isRTL) {
          htmlEl.setAttribute('dir', 'rtl');
          if (rtlSpan) rtlSpan.textContent = 'LTR';
          if (rtlIconElem) rtlIconElem.className = 'fas fa-arrow-left';
        } else {
          htmlEl.setAttribute('dir', 'ltr');
          if (rtlSpan) rtlSpan.textContent = 'RTL';
          if (rtlIconElem) rtlIconElem.className = 'fas fa-exchange-alt';
        }
        localStorage.setItem('henra_dir', isRTL ? 'rtl' : 'ltr');
      }
      
      function toggleRTL() {
        const currentDir = document.documentElement.getAttribute('dir');
        setDirection(currentDir !== 'rtl');
      }
      
      const savedDir = localStorage.getItem('henra_dir');
      setDirection(savedDir === 'rtl');
      if (rtlBtn) rtlBtn.addEventListener('click', toggleRTL);
      
      // ----- PASSWORD STRENGTH -----
      const passwordField = document.getElementById('password');
      const strengthFill = document.getElementById('strengthFill');
      const strengthTextSpan = document.getElementById('strengthText');
      
      function calcStrength(pwd) {
        if (!pwd) return 0;
        let score = 0;
        if (pwd.length >= 8) score++;
        if (pwd.length >= 12) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;
        return Math.min(score, 4);
      }
      
      function updateMeter() {
        const pwd = passwordField.value;
        const strength = calcStrength(pwd);
        let percent = 0, label = 'Weak', color = '#e74c3c';
        
        if (pwd.length === 0) {
          percent = 0; label = 'Weak'; color = 'var(--secondary)';
        } else if (strength === 1) {
          percent = 25; label = 'Weak'; color = '#e74c3c';
        } else if (strength === 2) {
          percent = 50; label = 'Fair'; color = '#f39c12';
        } else if (strength === 3) {
          percent = 75; label = 'Good'; color = '#2ecc71';
        } else {
          percent = 100; label = 'Strong'; color = '#27ae60';
        }
        
        if (strengthFill) {
          strengthFill.style.width = percent + '%';
          strengthFill.style.backgroundColor = color;
        }
        if (strengthTextSpan) {
          strengthTextSpan.textContent = label;
          strengthTextSpan.style.color = color;
        }
      }
      
      if (passwordField) passwordField.addEventListener('input', updateMeter);
      
      // ----- CONFIRM PASSWORD MATCH -----
      const confirmField = document.getElementById('confirmPassword');
      function syncConfirmBorder() {
        if (!confirmField || !passwordField) return;
        const confirmVal = confirmField.value;
        const passVal = passwordField.value;
        if (confirmVal.length > 0) {
          if (passVal === confirmVal) {
            confirmField.style.borderColor = '#2ecc71';
            confirmField.style.boxShadow = '0 0 0 1px rgba(46, 204, 113, 0.3)';
          } else {
            confirmField.style.borderColor = '#e74c3c';
            confirmField.style.boxShadow = '0 0 0 1px rgba(231, 76, 60, 0.2)';
          }
        } else {
          confirmField.style.borderColor = 'var(--border)';
          confirmField.style.boxShadow = 'none';
        }
      }
      
      if (confirmField && passwordField) {
        passwordField.addEventListener('input', syncConfirmBorder);
        confirmField.addEventListener('input', syncConfirmBorder);
      }
      
      // ----- FORM SUBMIT HANDLER -----
      const form = document.getElementById('signupForm');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const fullname = document.getElementById('fullname')?.value.trim();
          const email = document.getElementById('email')?.value.trim();
          const password = passwordField?.value;
          const confirm = confirmField?.value;
          const termsOk = document.getElementById('agreeTerms')?.checked;
          
          if (!fullname || !email || !password || !confirm) {
            alert('Please fill in all required fields.');
            return;
          }
          if (!email.includes('@') || !email.includes('.')) {
            alert('Please enter a valid email address.');
            return;
          }
          if (password.length < 6) {
            alert('Password must be at least 6 characters.');
            return;
          }
          if (password !== confirm) {
            alert('Passwords do not match.');
            return;
          }
          if (!termsOk) {
            alert('Please agree to the Terms & Privacy Policy.');
            return;
          }
          alert(`🎉 Welcome to Henra, ${fullname}!\nYour account has been created.\n\nEmail: ${email}`);
        });
      }
      
      // ----- RESPONSIVE ENHANCEMENTS: ensure card fits 360x740 perfectly -----
      function enforceCompactSpacing() {
        const container = document.querySelector('.signup-container');
        if (!container) return;
        const width = window.innerWidth;
        if (width <= 360) {
          container.style.padding = '14px 12px';
        } else if (width <= 400) {
          container.style.padding = '16px 14px';
        } else if (width <= 480) {
          container.style.padding = '18px 16px';
        } else {
          container.style.padding = '22px 20px';
        }
      }
      
      function adjustTogglePosition() {
        const bar = document.querySelector('.toggle-bar');
        if (bar) {
          const isNarrow = window.innerWidth <= 400;
          bar.style.gap = isNarrow ? '6px' : '8px';
          if (window.innerWidth <= 360) bar.style.gap = '5px';
        }
      }
      
      window.addEventListener('resize', () => {
        enforceCompactSpacing();
        adjustTogglePosition();
      });
      
      // entrance animation
      const card = document.querySelector('.signup-container');
      if (card) {
        card.style.opacity = '0';
        setTimeout(() => {
          card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
        }, 40);
      }
      
      // initial setup
      enforceCompactSpacing();
      adjustTogglePosition();
      updateMeter();
      syncConfirmBorder();
      
      // watch for dark mode changes to keep spacing
      const observer = new MutationObserver(() => enforceCompactSpacing());
      observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
    })();
  </script>
</body>
</html>
