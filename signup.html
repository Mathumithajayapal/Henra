<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Henra - Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link rel="icon" type="image/jpeg" href="images\favicon.jpg">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #000000;
      --secondary: #8B5E3C;
      --secondary-light: #A97C58;
      --secondary-dark: #6B4226;
      --text: #000000;
      --text-light: #333333;
      --bg: #FFFFFF;
      --bg-light: #F5F0EB;
      --border: #D4B8A0;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 20px 30px rgba(139, 94, 60, 0.12);
      --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      --body-bg-start: #F7F2EC;
      --body-bg-end: #EBDDCB;
      --input-bg: #FFFFFF;
    }

    .dark-mode {
      --primary: #C8956A;
      --secondary: #C8956A;
      --secondary-light: #D9AF84;
      --secondary-dark: #A57248;
      --text: #F5F0EB;
      --text-light: #CFC5BC;
      --bg: #1E150E;
      --bg-light: #2B2017;
      --border: #5C3D1E;
      --body-bg-start: #000000;
      --body-bg-end: #0a0a0a;
      --input-bg: #2A1F16;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: linear-gradient(125deg, var(--body-bg-start) 0%, var(--body-bg-end) 100%);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s ease;
      padding: 1.2rem;
    }

    h1, h2, h3, .logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
    }

    /* unified toggle bar — both buttons perfectly aligned */
    .toggle-bar {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 12px;
      z-index: 1000;
      background: transparent;
    }

    .toggle-btn {
      background: var(--bg);
      backdrop-filter: blur(2px);
      border: 1.5px solid var(--border);
      border-radius: 60px;
      padding: 8px 16px;
      cursor: pointer;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      box-shadow: var(--shadow);
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.3px;
    }

    .toggle-btn i {
      font-size: 0.9rem;
      color: var(--secondary);
    }

    .toggle-btn:hover {
      transform: translateY(-2px);
      border-color: var(--secondary);
      background: var(--bg-light);
      box-shadow: 0 6px 12px rgba(139, 94, 60, 0.15);
    }

    /* compact card size */
    .signup-card-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .signup-container {
      max-width: 420px;
      width: 100%;
      background: var(--bg);
      border-radius: 36px;
      box-shadow: var(--shadow-lg);
      padding: 32px 28px;
      border: 1px solid var(--border);
      transition: var(--transition);
    }

    .signup-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      margin-bottom: 14px;
      cursor: default;
    }

    .logo i {
      color: var(--secondary);
      font-size: 26px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--secondary-dark), var(--secondary-light));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .signup-header h2 {
      font-size: 1.7rem;
      color: var(--text);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .signup-header p {
      color: var(--text-light);
      font-size: 0.85rem;
    }

    .signup-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--text);
      letter-spacing: 0.3px;
      margin-left: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      color: var(--secondary);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1.5px solid var(--border);
      border-radius: 60px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      background: var(--input-bg);
      color: var(--text);
      transition: var(--transition);
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(139, 94, 60, 0.2);
    }

    .form-options {
      display: flex;
      align-items: center;
      margin: 6px 0 4px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--text-light);
      font-size: 0.8rem;
    }

    .checkbox-label input {
      width: 14px;
      height: 14px;
      accent-color: var(--secondary);
      cursor: pointer;
    }

    .terms-link {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 600;
    }

    .terms-link:hover {
      text-decoration: underline;
    }

    .signup-btn-submit {
      background: var(--secondary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Poppins', sans-serif;
      margin-top: 4px;
    }

    .signup-btn-submit:hover {
      background: var(--secondary-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0 18px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider span {
      padding: 0 14px;
      color: var(--text-light);
      font-size: 0.7rem;
      font-weight: 500;
    }

    .social-signup {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 60px;
      background: transparent;
      color: var(--text);
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }

    .social-btn i {
      font-size: 1rem;
      color: var(--secondary);
    }

    .social-btn:hover {
      background: var(--bg-light);
      border-color: var(--secondary);
      transform: translateY(-1px);
    }

    .login-prompt {
      text-align: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--text-light);
      font-size: 0.8rem;
    }

    .login-prompt a {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 700;
      margin-left: 6px;
    }

    .login-prompt a:hover {
      text-decoration: underline;
    }

    .password-strength {
      margin-top: 6px;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .strength-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      background: var(--secondary);
      transition: width 0.3s ease, background 0.3s ease;
      border-radius: 4px;
    }

    .strength-text {
      color: var(--text-light);
      font-weight: 500;
    }

    /* RTL alignment fix — perfect spacing */
    [dir="rtl"] .input-wrapper i {
      left: auto;
      right: 16px;
    }

    [dir="rtl"] .input-wrapper input {
      padding-left: 16px;
      padding-right: 44px;
    }

    [dir="rtl"] .checkbox-label {
      flex-direction: row-reverse;
    }

    [dir="rtl"] .social-btn i {
      margin-left: 4px;
      margin-right: 0;
    }

    [dir="rtl"] .strength-text {
      text-align: right;
    }

    /* responsive adjustments */
    @media (max-width: 520px) {
      .toggle-bar {
        top: 12px;
        right: 12px;
        gap: 8px;
      }
      .toggle-btn {
        padding: 6px 12px;
        font-size: 0.75rem;
      }
      .toggle-btn i {
        font-size: 0.8rem;
      }
      .signup-container {
        padding: 28px 20px;
        max-width: 360px;
      }
      .signup-header h2 {
        font-size: 1.5rem;
      }
      .logo-text {
        font-size: 20px;
      }
      .social-btn {
        padding: 8px;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 420px) {
      .toggle-bar {
        gap: 6px;
      }
      .toggle-btn {
        padding: 5px 10px;
      }
      .signup-container {
        padding: 24px 18px;
      }
    }

    /* entrance animation */
    .signup-container {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease, background 0.2s;
    }
  </style>
</head>
<body>

  <!-- Unified toggle bar: both buttons perfectly aligned -->
  <div class="toggle-bar">
    <button class="toggle-btn" id="themeToggleBtn">
      <i class="fas fa-moon"></i> <span id="themeText">Dark</span>
    </button>
    <button class="toggle-btn" id="rtlToggleBtn">
      <i class="fas fa-exchange-alt"></i> <span id="rtlText">RTL</span>
    </button>
  </div>

  <div class="signup-card-wrapper">
    <div class="signup-container">
      <div class="signup-header">
        <div class="logo" style="justify-content: center; display: flex;">
          <i class="fas fa-leaf"></i>
         <a href="index.html" style="text-decoration: none;"> <span class="logo-text">Henra</span></a>
        </div>
        <h2>Create Account</h2>
        <p>Join Henra and start your journey</p>
      </div>

      <form class="signup-form" id="signupForm">
        <div class="input-group">
          <label for="fullname">Full Name</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
          </div>
        </div>

        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="hello@henra.com" required>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Create a strong password" required>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-text" id="strengthText">Weak</span>
          </div>
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <i class="fas fa-check-circle"></i>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="agreeTerms" required>
            <span>I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="signup-btn-submit">Sign Up</button>
      </form>

      <div class="divider">
        <span>OR SIGN UP WITH</span>
      </div>

      <div class="social-signup">
        <a href="#" class="social-btn">
          <i class="fab fa-google"></i> Google
        </a>
        <a href="#" class="social-btn">
          <i class="fab fa-facebook-f"></i> Facebook
        </a>
      </div>

      <div class="login-prompt">
        Already have an account?
        <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ----- THEME (Dark/Light) - DEFAULT LIGHT MODE -----
      const themeBtn = document.getElementById('themeToggleBtn');
      const themeIconSpan = themeBtn?.querySelector('i');
      const themeTextSpan = document.getElementById('themeText');

      function setTheme(isDark) {
        if (isDark) {
          document.body.classList.add('dark-mode');
        } else {
          document.body.classList.remove('dark-mode');
        }
        
        if (themeIconSpan) {
          themeIconSpan.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
        if (themeTextSpan) {
          themeTextSpan.textContent = isDark ? 'Light' : 'Dark';
        }
        
        localStorage.setItem('henra_theme', isDark ? 'dark' : 'light');
      }

      function toggleTheme() {
        const isDarkNow = !document.body.classList.contains('dark-mode');
        setTheme(isDarkNow);
      }

      // DEFAULT: LIGHT MODE
      const storedTheme = localStorage.getItem('henra_theme');
      if (storedTheme === 'dark') {
        setTheme(true);
      } else if (storedTheme === 'light') {
        setTheme(false);
      } else {
        setTheme(false); // Default to light mode
      }
      
      if (themeBtn) themeBtn.addEventListener('click', toggleTheme);

      // ----- RTL TOGGLE -----
      const rtlBtn = document.getElementById('rtlToggleBtn');
      const rtlTextSpan = document.getElementById('rtlText');
      const rtlIcon = rtlBtn?.querySelector('i');

      function setDirection(isRTL) {
        const htmlElem = document.documentElement;
        if (isRTL) {
          htmlElem.setAttribute('dir', 'rtl');
          if (rtlTextSpan) rtlTextSpan.textContent = 'LTR';
          if (rtlIcon) rtlIcon.className = 'fas fa-arrow-left';
        } else {
          htmlElem.setAttribute('dir', 'ltr');
          if (rtlTextSpan) rtlTextSpan.textContent = 'RTL';
          if (rtlIcon) rtlIcon.className = 'fas fa-exchange-alt';
        }
        localStorage.setItem('henra_dir', isRTL ? 'rtl' : 'ltr');
      }

      function toggleRTL() {
        const currentDir = document.documentElement.getAttribute('dir');
        const newIsRTL = currentDir !== 'rtl';
        setDirection(newIsRTL);
      }

      const savedDir = localStorage.getItem('henra_dir');
      if (savedDir === 'rtl') {
        setDirection(true);
      } else {
        setDirection(false);
      }

      if (rtlBtn) rtlBtn.addEventListener('click', toggleRTL);

      // ----- PASSWORD STRENGTH METER -----
      const passwordInput = document.getElementById('password');
      const strengthFill = document.getElementById('strengthFill');
      const strengthText = document.getElementById('strengthText');

      function calculatePasswordStrength(password) {
        let score = 0;
        if (!password) return 0;
        
        if (password.length >= 8) score++;
        if (password.length >= 12) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;
        
        return Math.min(score, 4);
      }

      function updateStrengthMeter() {
        const password = passwordInput.value;
        const strength = calculatePasswordStrength(password);
        let percentage = 0;
        let text = '';
        let color = '';
        
        if (password.length === 0) {
          percentage = 0;
          text = 'Weak';
          color = '#8B5E3C';
        } else if (strength === 1) {
          percentage = 25;
          text = 'Weak';
          color = '#e74c3c';
        } else if (strength === 2) {
          percentage = 50;
          text = 'Fair';
          color = '#f39c12';
        } else if (strength === 3) {
          percentage = 75;
          text = 'Good';
          color = '#2ecc71';
        } else {
          percentage = 100;
          text = 'Strong';
          color = '#27ae60';
        }
        
        strengthFill.style.width = percentage + '%';
        strengthFill.style.background = color;
        strengthText.textContent = text;
        strengthText.style.color = color;
      }

      if (passwordInput) {
        passwordInput.addEventListener('input', updateStrengthMeter);
      }

      // ----- SIGNUP FORM HANDLER -----
      const signupForm = document.getElementById('signupForm');
      
      if (signupForm) {
        signupForm.addEventListener('submit', function(e) {
          e.preventDefault();
          
          const fullname = document.getElementById('fullname')?.value.trim();
          const email = document.getElementById('email')?.value.trim();
          const password = document.getElementById('password')?.value;
          const confirmPassword = document.getElementById('confirmPassword')?.value;
          const agreeTerms = document.getElementById('agreeTerms')?.checked;
          
          // Validation
          if (!fullname || !email || !password || !confirmPassword) {
            alert('Please fill in all fields.');
            return;
          }
          
          if (!email.includes('@') || !email.includes('.')) {
            alert('Please enter a valid email address.');
            return;
          }
          
          if (password.length < 6) {
            alert('Password must be at least 6 characters long.');
            return;
          }
          
          if (password !== confirmPassword) {
            alert('Passwords do not match. Please try again.');
            return;
          }
          
          if (!agreeTerms) {
            alert('Please agree to the Terms of Service and Privacy Policy.');
            return;
          }
          
          // Demo success alert
          alert(`🎉 Welcome to Henra, ${fullname}! Your account has been created successfully.\n\nEmail: ${email}\n\n(Demo sign-up successful)`);
          
          // Optional: Reset form or redirect
          // signupForm.reset();
          // strengthFill.style.width = '0%';
          // strengthText.textContent = 'Weak';
        });
      }
      
      // ----- CONFIRM PASSWORD REAL-TIME MATCH INDICATOR (optional enhancement) -----
      const confirmInput = document.getElementById('confirmPassword');
      if (confirmInput && passwordInput) {
        function checkPasswordMatch() {
          const confirmValue = confirmInput.value;
          const passwordValue = passwordInput.value;
          if (confirmValue.length > 0) {
            if (passwordValue === confirmValue) {
              confirmInput.style.borderColor = '#2ecc71';
            } else {
              confirmInput.style.borderColor = '#e74c3c';
            }
          } else {
            confirmInput.style.borderColor = 'var(--border)';
          }
        }
        
        passwordInput.addEventListener('input', checkPasswordMatch);
        confirmInput.addEventListener('input', checkPasswordMatch);
      }

      // smooth entrance animation
      const container = document.querySelector('.signup-container');
      if (container) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(12px)';
        setTimeout(() => {
          container.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
          container.style.opacity = '1';
          container.style.transform = 'translateY(0)';
        }, 60);
      }
      
      // handle responsive toggle bar
      function handleToggleBarResponsive() {
        const toggleBar = document.querySelector('.toggle-bar');
        if (!toggleBar) return;
        if (window.innerWidth <= 520) {
          toggleBar.style.gap = '8px';
        } else {
          toggleBar.style.gap = '12px';
        }
      }
      handleToggleBarResponsive();
      window.addEventListener('resize', handleToggleBarResponsive);
      
      // Initialize strength meter
      updateStrengthMeter();
    })();
  </script>
</body>
</html>
