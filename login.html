<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Henra - Elegant Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link rel="icon" type="image/jpeg" href="images\favicon.jpg">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #000000;
      --secondary: #8B5E3C;
      --secondary-light: #A97C58;
      --secondary-dark: #6B4226;
      --text: #000000;
      --text-light: #333333;
      --bg: #FFFFFF;
      --bg-light: #F5F0EB;
      --border: #D4B8A0;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 20px 30px rgba(139, 94, 60, 0.12);
      --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      --body-bg-start: #F7F2EC;
      --body-bg-end: #EBDDCB;
    }

    .dark-mode {
      --primary: #C8956A;
      --secondary: #C8956A;
      --secondary-light: #D9AF84;
      --secondary-dark: #A57248;
      --text: #F5F0EB;
      --text-light: #CFC5BC;
      --bg: #1E150E;
      --bg-light: #2B2017;
      --border: #5C3D1E;
      --body-bg-start: #000000;
      --body-bg-end: #0a0a0a;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: linear-gradient(125deg, var(--body-bg-start) 0%, var(--body-bg-end) 100%);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s ease;
      padding: 1.2rem;
    }

    h1, h2, h3, .logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
    }

    /* unified toggle bar — both buttons perfectly aligned */
    .toggle-bar {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 12px;
      z-index: 1000;
      background: transparent;
    }

    .toggle-btn {
      background: var(--bg);
      backdrop-filter: blur(2px);
      border: 1.5px solid var(--border);
      border-radius: 60px;
      padding: 8px 16px;
      cursor: pointer;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      box-shadow: var(--shadow);
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.3px;
    }

    .toggle-btn i {
      font-size: 0.9rem;
      color: var(--secondary);
    }

    .toggle-btn:hover {
      transform: translateY(-2px);
      border-color: var(--secondary);
      background: var(--bg-light);
      box-shadow: 0 6px 12px rgba(139, 94, 60, 0.15);
    }

    /* compact card size */
    .login-card-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      max-width: 400px;
      width: 100%;
      background: var(--bg);
      border-radius: 36px;
      box-shadow: var(--shadow-lg);
      padding: 32px 28px;
      border: 1px solid var(--border);
      transition: var(--transition);
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      margin-bottom: 14px;
      cursor: default;
    }

    .logo i {
      color: var(--secondary);
      font-size: 26px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--secondary-dark), var(--secondary-light));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-header h2 {
      font-size: 1.7rem;
      color: var(--text);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .login-header p {
      color: var(--text-light);
      font-size: 0.85rem;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--text);
      letter-spacing: 0.3px;
      margin-left: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      color: var(--secondary);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1.5px solid var(--border);
      border-radius: 60px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      background: var(--bg);
      color: var(--text);
      transition: var(--transition);
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(139, 94, 60, 0.2);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      margin: 4px 0 2px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--text-light);
    }

    .checkbox-label input {
      width: 14px;
      height: 14px;
      accent-color: var(--secondary);
      cursor: pointer;
    }

    .forgot-link {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.8rem;
      transition: var(--transition);
    }

    .forgot-link:hover {
      color: var(--secondary-dark);
      text-decoration: underline;
    }

    .login-btn-submit {
      background: var(--secondary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Poppins', sans-serif;
      margin-top: 6px;
    }

    .login-btn-submit:hover {
      background: var(--secondary-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0 18px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider span {
      padding: 0 14px;
      color: var(--text-light);
      font-size: 0.7rem;
      font-weight: 500;
    }

    .social-login {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 60px;
      background: transparent;
      color: var(--text);
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }

    .social-btn i {
      font-size: 1rem;
      color: var(--secondary);
    }

    .social-btn:hover {
      background: var(--bg-light);
      border-color: var(--secondary);
      transform: translateY(-1px);
    }

    .signup-prompt {
      text-align: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--text-light);
      font-size: 0.8rem;
    }

    .signup-prompt a {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 700;
      margin-left: 6px;
    }

    .signup-prompt a:hover {
      text-decoration: underline;
    }

    /* RTL alignment fix — perfect spacing */
    [dir="rtl"] .input-wrapper i {
      left: auto;
      right: 16px;
    }

    [dir="rtl"] .input-wrapper input {
      padding-left: 16px;
      padding-right: 44px;
    }

    [dir="rtl"] .checkbox-label {
      flex-direction: row-reverse;
    }

    [dir="rtl"] .forgot-link {
      margin-right: auto;
    }

    [dir="rtl"] .social-btn i {
      margin-left: 4px;
      margin-right: 0;
    }

    /* responsive: stack toggles on very small screens but still neat */
    @media (max-width: 520px) {
      .toggle-bar {
        top: 12px;
        right: 12px;
        gap: 8px;
      }
      .toggle-btn {
        padding: 6px 12px;
        font-size: 0.75rem;
      }
      .toggle-btn i {
        font-size: 0.8rem;
      }
      .login-container {
        padding: 28px 20px;
        max-width: 360px;
      }
      .login-header h2 {
        font-size: 1.5rem;
      }
      .logo-text {
        font-size: 20px;
      }
      .social-btn {
        padding: 8px;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 420px) {
      .toggle-bar {
        gap: 6px;
      }
      .toggle-btn {
        padding: 5px 10px;
      }
      .login-container {
        padding: 24px 18px;
      }
    }

    /* entrance animation */
    .login-container {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease, background 0.2s;
    }
  </style>
</head>
<body>

  <!-- Unified toggle bar: both buttons perfectly aligned in a flex row -->
  <div class="toggle-bar">
    <button class="toggle-btn" id="themeToggleBtn">
      <i class="fas fa-moon"></i> <span id="themeText">Dark</span>
    </button>
    <button class="toggle-btn" id="rtlToggleBtn">
      <i class="fas fa-exchange-alt"></i> <span id="rtlText">RTL</span>
    </button>
  </div>

  <div class="login-card-wrapper">
    <div class="login-container">
      <div class="login-header">
        <div class="logo" style="justify-content: center; display: flex;">
          <i class="fas fa-leaf"></i>
         <a href="index.html" style="text-decoration: none;"> <span class="logo-text">Henra</span></a>
        </div>
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="hello@henra.com" required>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe"> <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn-submit">Sign In</button>
      </form>

      <div class="divider">
        <span>OR CONTINUE WITH</span>
      </div>

      <div class="social-login">
        <a href="#" class="social-btn">
          <i class="fab fa-google"></i> Google
        </a>
        <a href="#" class="social-btn">
          <i class="fab fa-facebook-f"></i> Facebook
        </a>
      </div>

      <div class="signup-prompt">
        Don't have an account?
        <a href="signup.html">Create Account</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ----- THEME (Dark/Light) - DEFAULT LIGHT MODE, DARK MODE TURNS BACKGROUND BLACK -----
      const themeBtn = document.getElementById('themeToggleBtn');
      const themeIconSpan = themeBtn?.querySelector('i');
      const themeTextSpan = document.getElementById('themeText');

      function setTheme(isDark) {
        if (isDark) {
          document.body.classList.add('dark-mode');
          // The dark-mode class now sets body background to pure black (#000000 to #0a0a0a)
          // through CSS variables --body-bg-start and --body-bg-end
        } else {
          document.body.classList.remove('dark-mode');
        }
        
        // Update button icon and text
        if (themeIconSpan) {
          themeIconSpan.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
        if (themeTextSpan) {
          themeTextSpan.textContent = isDark ? 'Light' : 'Dark';
        }
        
        localStorage.setItem('henra_theme', isDark ? 'dark' : 'light');
      }

      function toggleTheme() {
        const isDarkNow = !document.body.classList.contains('dark-mode');
        setTheme(isDarkNow);
      }

      // DEFAULT: LIGHT MODE (no dark class)
      // Check stored theme, but ensure default is LIGHT if nothing stored
      const storedTheme = localStorage.getItem('henra_theme');
      if (storedTheme === 'dark') {
        setTheme(true);  // User had dark mode saved
      } else if (storedTheme === 'light') {
        setTheme(false); // User had light mode saved
      } else {
        // Default to LIGHT mode (no dark class)
        setTheme(false);
      }
      
      if (themeBtn) themeBtn.addEventListener('click', toggleTheme);

      // ----- RTL TOGGLE (perfect alignment & proper icon/text update) -----
      const rtlBtn = document.getElementById('rtlToggleBtn');
      const rtlTextSpan = document.getElementById('rtlText');
      const rtlIcon = rtlBtn?.querySelector('i');

      function setDirection(isRTL) {
        const htmlElem = document.documentElement;
        if (isRTL) {
          htmlElem.setAttribute('dir', 'rtl');
          if (rtlTextSpan) rtlTextSpan.textContent = 'LTR';
          if (rtlIcon) rtlIcon.className = 'fas fa-arrow-left';
        } else {
          htmlElem.setAttribute('dir', 'ltr');
          if (rtlTextSpan) rtlTextSpan.textContent = 'RTL';
          if (rtlIcon) rtlIcon.className = 'fas fa-exchange-alt';
        }
        localStorage.setItem('henra_dir', isRTL ? 'rtl' : 'ltr');
      }

      function toggleRTL() {
        const currentDir = document.documentElement.getAttribute('dir');
        const newIsRTL = currentDir !== 'rtl';
        setDirection(newIsRTL);
      }

      // Load saved direction preference (default LTR)
      const savedDir = localStorage.getItem('henra_dir');
      if (savedDir === 'rtl') {
        setDirection(true);
      } else if (savedDir === 'ltr') {
        setDirection(false);
      } else {
        // default LTR
        setDirection(false);
      }

      if (rtlBtn) rtlBtn.addEventListener('click', toggleRTL);

      // ---- LOGIN FORM HANDLER with demo feedback ----
      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
          e.preventDefault();
          const emailInput = document.getElementById('email');
          const passwordInput = document.getElementById('password');
          const email = emailInput?.value.trim();
          const password = passwordInput?.value;
          
          if (!email || !password) {
            alert('Please enter both email and password.');
            return;
          }
          if (!email.includes('@')) {
            alert('Please enter a valid email address.');
            return;
          }
          // Demo success alert
          alert(`✨ Welcome back, ${email}! (Demo sign-in successful)`);
        });
      }

      // smooth entrance animation after a short micro delay
      const container = document.querySelector('.login-container');
      if (container) {
        container.style.opacity = '0';
        container.style.transform = 'translateY(12px)';
        setTimeout(() => {
          container.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
          container.style.opacity = '1';
          container.style.transform = 'translateY(0)';
        }, 60);
      }
      
      // handle any dynamic resizing for toggle-bar clean
      function handleToggleBarResponsive() {
        const toggleBar = document.querySelector('.toggle-bar');
        if (!toggleBar) return;
        if (window.innerWidth <= 520) {
          toggleBar.style.gap = '8px';
        } else {
          toggleBar.style.gap = '12px';
        }
      }
      handleToggleBarResponsive();
      window.addEventListener('resize', handleToggleBarResponsive);
      
      // Ensure that when dark mode is active, the entire background becomes black/dark
      // This is already handled by CSS variables: .dark-mode sets --body-bg-start: #000000 and --body-bg-end: #0a0a0a
      // The body background uses var(--body-bg-start) and var(--body-bg-end)
      // So when dark-mode class is added, background transitions to pure black gradient
      
      // Additional note: For users who prefer a fully black background, the gradient is nearly black (#000000 to #0a0a0a)
      // making it appear completely black/dark charcoal.
      
      // Optional: Add a small indicator that dark mode is active (already handled by button icon)
    })();
  </script>
</body>
</html>
